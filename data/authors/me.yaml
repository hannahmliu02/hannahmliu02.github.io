bio: |
  My research and professional work primarily focuses on creating the mechanisms required to build globally applicable, ethically adequate, and decentralised AI governance frameworks. I use my background in cognitive science and computation to answer sociotechnical questions about AI applications, deriving insights from fields such as psychology, neuroscience, linguistics, and philosophy to better inform approaches to computational problems. I also analyse how we can best integrate AI applications into society without causing harm to underrepresented populations. 
